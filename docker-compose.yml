version: '3.8'

services:
  db:
    image: postgres:15
    container_name: uzrock_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uzrock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: uzrock_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/uzrock_db
    depends_on:
      - db

volumes:
  postgres_data:
